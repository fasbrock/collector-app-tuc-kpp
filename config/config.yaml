#----------------------------------------------------------------
# Styling

# Title of the app (shown on top left)
main_title: "RESQUE TU Chemnitz - Klinische Psychologie"

# Background color of the app
background_color: "#c3e8e2"

# Should the scoring box on the top right be hidden? 
hide_score: false

# Show the welcome message (text is defined in config/instructions.md)
show_instruction: true

# Show the beta warning message
show_beta_warning: false

# Add a logo to the top left (next to the title) and to the welcome message (if show_instruction is true)
image_url: https://www.tu-chemnitz.de/ub/images/seitenbilder/icons/KHS_TUC_einfarbig_dt.jpg



#----------------------------------------------------------------
# Committee settings

# Should these committee limits even be used? (Relevant for data export)
committee_limits: true

# Minimum number of papers that are expected by the committee
min: 5

# Maximum number of papers that are expected by the committee
max: 10

# Number of top papers that must be selected
max_top_papers: 3



#----------------------------------------------------------------
# Indicator settings
# (While nearly all indicator settings are defined in the respective packs, some settings are defined here)

# If "true": The merit statement and impact statement are only required 
# for publications that are selected as "top publications"
statements_only_for_top_publications: true


#----------------------------------------------------------------
# Scoring settings

# Minimum number of papers that must be entered before 
# showing a warning is shown at the scoring box
min_RO_warning_threshold: 0

# which packs should be included?
meta:
  sources: ["packs/core-meta.json", "packs/user.json"]
  exclude: ["RaterType", "DateCreated", "LastChange", "METASEP1"]
  config:
    min_indicators_warning_threshold: 0

pubs:
  sources: ["packs/core-pubs.json", "packs/EP/EP-clinical_psychology.json"]
  exclude: ["P_IndependentVerification", "P_Stimuli", "P_ImpactStatement_Info", "P_ImpactStatement", "sep_before_correctness", "P17P18SEP", "CP_Methods_NullResults", "P_Sample_CoG", "P_Sample_CrossCultural", "stimsep"]
  config:
    min_indicators_warning_threshold: 0

data:
  sources: ["packs/core-data.json"]
  config:
    min_indicators_warning_threshold: 0

software:
  sources: ["packs/core-software.json"]
  config:
    min_indicators_warning_threshold: 0


# Define the scoring categories
#--------------------------------
# For the cue field (which is a RegExp on the indicator IDs), 
# use | to separate multiple cues.
# For the report generation in the RESQUER package, use these
# standardized category titles:
# "Open Data", "Open Materials", "Preregistration","Reproducible Code"
# (They are also regExp'ed, so you can add additional text, e.g.,
# "Reproducible Code & Verification" will also work)


score_categories:
  - title: "Open Data"
    cue: "Data"
    color: '#beaed4'

  - title: "Open Materials"
    cue: "OpenMaterials"
    color: '#fdc086'

  - title: "Preregistration"
    cue: "Prereg"
    color: '#d95f02'

  - title: "Reproducible Code"
    cue: "ReproducibleScripts"
    color: '#386cb0'

  - title: "Methodological Rigor"
    cue: "_Methods_"
    color: '#f0027f'
